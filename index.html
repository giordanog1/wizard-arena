function addRockAura(owner){
  owner.shield=150;
  floatText(owner.x,owner.y-55,'ROCK AURA',owner.color,true);
  addRing(owner.x,owner.y,owner.color,true);
  burst(owner.x,owner.y,owner.color,28,4);
  for(let i=0;i<6;i++){
    rocks.push({owner,ang:i*Math.PI*2/6+rnd(-.18,.18),dist:54+rnd(-4,8),size:10+rnd(0,4),life:360,spin:rnd(.018,.034)});
  }
  pop('TERRA ROCK WALL',owner.color);
}
function drawRock(r){
  const x=r.x||r.owner.x+Math.cos(r.ang)*r.dist;
  const y=r.y||r.owner.y+Math.sin(r.ang)*r.dist;
  const sz=r.size|0;
  pr(x-sz,y-sz*.6,sz*2,sz,'#1b2a18');
  pr(x-sz+2,y-sz*.6+2,sz*2-4,sz-2,'#5d704f');
  pr(x-3,y-sz*.6+1,6,3,'#c8d6b8');
  pr(x+sz-5,y+1,4,4,'#2d3a28');
}
function updateRocks(){
  for(let i=rocks.length-1;i>=0;i--){
    const r=rocks[i];
    if(!r.owner||r.owner.hp<=0){rocks.splice(i,1);continue}
    r.life--;
    r.ang+=r.spin;
    r.dist+=Math.sin((t+r.ang*20)*.05)*.05;
    r.x=r.owner.x+Math.cos(r.ang)*r.dist;
    r.y=r.owner.y+Math.sin(r.ang)*r.dist;
    let broken=false;
    for(const o of wiz){
      if(o!==r.owner&&o.hp>0&&Math.hypot(o.x-r.x,o.y-r.y)<R+r.size){
        const dx=o.x-r.x,dy=o.y-r.y,len=Math.hypot(dx,dy)||1;
        const dmg=o.shield>0?6:13;
        o.hp-=dmg;
        o.vx+=dx/len*4.8;
        o.vy+=dy/len*4.8;
        award(r.owner,dmg,false);
        r.owner.ability+=dmg;
        floatText(o.x,o.y-58,'ROCK -'+dmg,r.owner.color,true);
        burst(r.x,r.y,'#8fa37a',42,7);
        addRing(r.x,r.y,r.owner.color,true);
        tone(155,.08,'square',.16,-120);
        shake=13;
        hitStop=4;
        broken=true;
        if(o.hp<=0){r.owner.kills++;pop('ROCK KO',r.owner.color);ko(o,r.owner)}
        break;
      }
    }
    if(broken||r.life<=0)rocks.splice(i,1);
  }
}

function addTornado(owner,target,spread=0){
  const dx=(target?target.x-owner.x:owner.vx),dy=(target?target.y-owner.y:owner.vy),d=Math.hypot(dx,dy)||1;
  const base=Math.atan2(dy,dx)+spread;
  tornados.push({owner,x:owner.x,y:owner.y,vx:Math.cos(base)*5.4,vy:Math.sin(base)*5.4,life:128,tick:0,spin:rnd(0,99),hit:{},color:owner.color});
  floatText(owner.x,owner.y-56,'TORNADO',owner.color,true);
  addRing(owner.x,owner.y,owner.color,true);
  burst(owner.x,owner.y,owner.color,20,5);
}
function drawTornado(td){
  ctx.save();
  ctx.translate(td.x,td.y);
  const sway=Math.sin((t+td.spin)*.2)*4;
  for(let y=-30;y<=30;y+=8){
    const width=10+(30-Math.abs(y))*.75;
    const off=Math.sin((t+td.spin+y)*.22)*9+sway;
    pr(off-width/2,y,width,4,'#dff7ffcc');
    pr(off-width/3,y+3,width*.66,3,td.color);
  }
  for(let i=0;i<5;i++){
    const a=(t*.18+i*1.256+td.spin);
    pr(Math.cos(a)*18,Math.sin(a)*28,5,5,'#ffffff');
  }
  ctx.restore();
}
function updateTornados(){
  for(let i=tornados.length-1;i>=0;i--){
    const td=tornados[i];
    td.x+=td.vx; td.y+=td.vy; td.life--; td.tick++;
    if(td.tick%7===0)burst(td.x,td.y,'#dff7ff',6,3);
    for(const o of wiz){
      if(o!==td.owner&&o.hp>0){
        const d=Math.hypot(o.x-td.x,o.y-td.y);
        if(d<R+38){
          const last=td.hit[o.name]||0;
          if(td.tick-last>14){
            td.hit[o.name]=td.tick;
            const dx=o.x-td.x,dy=o.y-td.y,len=Math.hypot(dx,dy)||1;
            const dmg=o.shield>0?7:14;
            o.hp-=dmg;
            o.vx+=dx/len*4.4+td.vx*.24;
            o.vy+=dy/len*4.4+td.vy*.24;
            award(td.owner,dmg,false);
            td.owner.ability+=dmg;
            floatText(o.x,o.y-56,'WIND -'+dmg,td.owner.color,true);
            burst(o.x,o.y,'#dff7ff',30,6);
            addRing(o.x,o.y,td.owner.color,true);
            tone(760,.07,'triangle',.15,220);
            shake=10; hitStop=3;
            if(o.hp<=0){td.owner.kills++;pop('TORNADO KO',td.owner.color);ko(o,td.owner)}
          }
        }
      }
    }
    if(td.life<=0||td.x<-80||td.x>W+80||td.y<0||td.y>H+80)tornados.splice(i,1);
  }
}

function hit(a,b){if(a.cool||b.cool||a.hp<=0||b.hp<=0)return;const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;if(d<R*2){const nx=dx/d,ny=dy/d,over=R*2-d;a.x-=nx*over/2;b.x+=nx*over/2;a.y-=ny*over/2;b.y+=ny*over/2;const av=a.vx*nx+a.vy*ny,bv=b.vx*nx+b.vy*ny;a.vx+=(bv-av)*nx;b.vx+=(av-bv)*nx;a.vy+=(bv-av)*ny;b.vy+=(av-bv)*ny;const ax=(a.x+b.x)/2,ay=(a.y+b.y)/2;let ma=1,mb=1;if(advantage[a.el]===b.el)ma=2;if(advantage[b.el]===a.el)mb=2;if(advantage[b.el]===a.el)ma=.6;if(advantage[a.el]===b.el)mb=.6;const critA=Math.random()<.17,critB=Math.random()<.17;let da=Math.ceil(rnd(5,10)*ma*(critA?1.85:1));let db=Math.ceil(rnd(5,10)*mb*(critB?1.85:1));if(b.shield>0){da=Math.ceil(da*.45);floatText(b.x,b.y-67,'BLOCK',b.color,false)}if(a.shield>0){db=Math.ceil(db*.45);floatText(a.x,a.y-67,'BLOCK',a.color,false)}b.hp-=da;a.hp-=db;award(a,da,critA);award(b,db,critB);a.cool=b.cool=14;shake=critA||critB?13:8;hitStop=critA||critB?5:3;burst(ax,ay,critA?a.color:b.color,critA||critB?34:22,critA||critB?7:5);addRing(ax,ay,'#ffffff',critA||critB);floatText(b.x,b.y-44,'-'+da,a.color,critA);floatText(a.x,a.y-44,'-'+db,b.color,critB);if(critA){floatText(ax,ay-28,'CRIT!',a.color,true);banner='CRITICAL HIT';bannerLife=34}if(critB){floatText(ax,ay-46,'CRIT!',b.color,true);banner='CRITICAL HIT';bannerLife=34}hitSound(a.el,critA||critB);if(b.hp<=0&&b.hp+da>0){a.kills++;pop('KO +1',a.color);ko(b,a)}if(a.hp<=0&&a.hp+db>0){b.kills++;pop('KO +1',b.color);ko(a,b)}}}

const BM_SHEET=new Image();
BM_SHEET.src='assets/battle-master/masterwizard_spritesheet.png';
BM_SHEET.onload=()=>draw();
const BM_FRAMES={neutral:[0,0],excited:[1,0],angry:[0,1],laughing:[1,1]};
function bmFrame(expr){
  const pos=BM_FRAMES[expr]||BM_FRAMES.neutral;
  if(!BM_SHEET.complete||!BM_SHEET.naturalWidth)return null;
  const cellW=BM_SHEET.naturalWidth/2,cellH=BM_SHEET.naturalHeight/2;
  const cropX=86,cropY=24,cropW=530,cropH=512;
  return {sx:pos[0]*cellW+cropX,sy:pos[1]*cellH+cropY,sw:cropW,sh:cropH};
}
let bmLine='THE ELEMENTS ARE READY!';
let bmExpr='neutral';
let bmTimer=220;
let bmLastLead='';
let bmLastAlive=4;
function bmSay(txt,expr,dur){bmLine=String(txt||'');bmExpr=expr||'neutral';bmTimer=dur||170;}
function bmUpdate(){
  if(bmTimer>0) bmTimer--;
  const aliveNow=wiz.filter(w=>w.hp>0).length;
  const top=topDamage();
  if(t===1) bmSay('WELCOME TO THE WIZARD BALL BATTLE!', 'excited', 240);
  if(!ended && top.total>120 && top.name!==bmLastLead){bmLastLead=top.name;bmSay(top.name+' TAKES THE DAMAGE LEAD!', 'excited', 180);}
  if(!ended && aliveNow<bmLastAlive){bmLastAlive=aliveNow;bmSay('A WIZARD BALL HAS BEEN KNOCKED OUT!', 'angry', 190);}
  if(!ended && bmTimer<=0 && t%520===0){const lines=['THE NUMBERS KEEP CLIMBING!','WATCH THE STAFFS ORBIT!','BIG HIT INCOMING!','THE ARENA IS PURE CHAOS!'];bmSay(lines[(t/520|0)%lines.length], 'laughing', 180);}
  if(ended && bmTimer<9999){const winner=wiz.filter(w=>w.hp>0)[0]||topDamage();bmSay(winner.name+' IS THE CHAMPION!', 'excited', 99999);}
}
function bmWrap(text,maxChars){
  const words=String(text).split(' '), lines=[]; let line='';
  for(const w of words){ if((line+' '+w).trim().length>maxChars){lines.push(line); line=w;} else line=(line+' '+w).trim(); }
  if(line) lines.push(line); return lines.slice(0,3);
}
function drawBattleMaster(){
  bmUpdate();
  if(bmTimer<=0) return;
  const y=733;
  const boxX=10, boxY=y+10, boxW=260, boxH=76;
  const px=286, py=y-2, ps=96;

  // compact side-by-side announcer UI: text box left, transparent Battle Master right
  rr(boxX+2,boxY+4,boxW,boxH,12,'#000000aa',null);
  rr(boxX,boxY,boxW,boxH,12,'#07111fdd','#ffffffcc');
  rr(boxX+4,boxY+4,boxW-8,boxH-8,9,'#05080fcc','#263d66');
  pr(boxX+14,boxY+2,70,3,'#fff36d');
  pr(boxX+18,boxY+boxH-5,104,2,'#ffffff33');

  pxt('BATTLE MASTER',boxX+14,boxY+11,2,'#fff36d');
  const lines=bmWrap(bmLine,25);
  for(let i=0;i<lines.length;i++) pxt(lines[i],boxX+14,boxY+32+i*13,2,'#ffffff');
  if((t>>4)%2===0) pr(boxX+boxW-20,boxY+boxH-16,8,8,'#ffffffcc');

  // portrait sits on the right without any white backing panel
  const frame=bmFrame(bmExpr);
  if(frame){
    ctx.save();
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(BM_SHEET,frame.sx,frame.sy,frame.sw,frame.sh,px,py,ps,ps);
    ctx.restore();
  }
}

function draw(){ctx.save();const sx=shake?rnd(-shake,shake)|0:0,sy=shake?rnd(-shake,shake)|0:0;if(shake)shake*=.82;ctx.translate(sx,sy);drawBG();for(const l of lava)drawLavaPool(l);for(const wv of waves)drawWave(wv);for(const td of tornados)drawTornado(td);for(const rr of rocks)drawRock(rr);for(const r of rings)pixelRing(r.x,r.y,r.r,r.color,r.big?6:8);for(const s of sparks){const x=s.x+Math.cos(s.a)*s.r,y=s.y+Math.sin(s.a)*s.r;pr(x,y,10,3,s.color);pr(x+3,y-3,3,10,s.color)}for(const p of parts)pr(p.x,p.y,p.size,p.size,p.color);for(const w of wiz)if(w.hp>0)drawHoverStaff(w);for(const w of wiz)drawBall(w);for(const w of wiz)if(w.kills>0)pxt('K'+w.kills,w.x,w.y-R-19,2,'#ffd34d','center');drawStats();for(const m of texts){pxt(m.txt,m.x+2,m.y+2,m.crit?3:2,'#000','center');pxt(m.txt,m.x,m.y,m.crit?3:2,m.crit?'#fff36d':m.color,'center')}let yy=122;for(const p of pops){pxt(p.txt,W/2+2,yy+2,2,'#000','center');pxt(p.txt,W/2,yy,2,p.col,'center');yy+=18}if(bannerLife>0){pr(26,119,338,44,'#000000bb');pr(26,119,338,3,'#ffffff88');pr(26,160,338,3,'#ffffff88');pxt(banner,W/2,134,3,'#fff','center')}drawBattleMaster();if(ended)drawEndStats();ctx.restore()}
function update(){if(hitStop>0){hitStop--;draw();requestAnimationFrame(update);return}t++;if(ended)endTick++;for(const w of wiz){if(w.hp<=0||ended)continue;w.cool=Math.max(0,w.cool-1);w.shield=Math.max(0,(w.shield||0)-1);w.abilityCd=Math.max(0,(w.abilityCd||0)-1);if(!w.abilityCd)castAbility(w);w.x+=w.vx;w.y+=w.vy;w.vx*=1.0006;w.vy*=1.0006;const sp=Math.hypot(w.vx,w.vy);if(sp>4.6){w.vx=w.vx/sp*4.6;w.vy=w.vy/sp*4.6}if(w.x<R+10){w.x=R+10;w.vx=Math.abs(w.vx);tone(120,.04,'square',.06)}if(w.x>W-R-10){w.x=W-R-10;w.vx=-Math.abs(w.vx);tone(120,.04,'square',.06)}if(w.y<R+84){w.y=R+84;w.vy=Math.abs(w.vy);tone(140,.04,'square',.06)}if(w.y>H-R-28){w.y=H-R-28;w.vy=-Math.abs(w.vy);tone(140,.04,'square',.06)}}if(!ended)for(let i=0;i<wiz.length;i++)for(let j=i+1;j<wiz.length;j++)hit(wiz[i],wiz[j]);if(!ended){updateLava();updateWaves();updateRocks();updateTornados();}for(let i=parts.length-1;i>=0;i--){let p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.life--;if(p.life<=0)parts.splice(i,1)}for(let i=texts.length-1;i>=0;i--){let m=texts[i];m.x+=m.vx;m.y+=m.vy;m.vy+=.06;m.life--;if(m.life<=0)texts.splice(i,1)}for(let i=rings.length-1;i>=0;i--){rings[i].r+=rings[i].big?4:3;rings[i].life--;if(rings[i].life<=0)rings.splice(i,1)}for(let i=bolts.length-1;i>=0;i--){let b=bolts[i];b.x+=b.vx;b.y+=b.vy;b.life--;let gone=b.life<=0||b.x<0||b.x>W||b.y<70||b.y>H;for(const o of wiz){if(!gone&&o!==b.owner&&o.hp>0&&Math.hypot(o.x-b.x,o.y-b.y)<R+12){boltHit(b,o);gone=true}}if(gone)bolts.splice(i,1)}for(let i=sparks.length-1;i>=0;i--){sparks[i].r+=5;sparks[i].life--;if(sparks[i].life<=0)sparks.splice(i,1)}for(let i=pops.length-1;i>=0;i--){pops[i].life--;if(pops[i].life<=0)pops.splice(i,1)}if(bannerLife>0)bannerLife--;if(leaderLife>0)leaderLife--;const alive=wiz.filter(w=>w.hp>0);if(alive.length<=1&&!ended){ended=true;banner=(alive[0]?alive[0].name:'NO ONE')+' WINS';bannerLife=999;setTimeout(stopRecord,5500)}draw();requestAnimationFrame(update)}
function stopRecord(){try{if(recorder&&recorder.state==='recording')recorder.stop()}catch(e){}document.getElementById('download').style.display='block'}function startRecord(){chunks=[];const stream=c.captureStream(60);if(audioCtx){const dest=audioCtx.createMediaStreamDestination();master.connect(dest);for(const tr of dest.stream.getAudioTracks())stream.addTrack(tr)}try{recorder=new MediaRecorder(stream,{mimeType:'video/webm'});}catch(e){recorder=new MediaRecorder(stream)}recorder.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};recorder.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});document.getElementById('download').href=URL.createObjectURL(blob)};recorder.start()}
document.getElementById('start').onclick=async()=>{document.getElementById('start').style.display='none';audioInit();await audioCtx.resume();music();startRecord();banner='BATTLE START';bannerLife=70;update()};draw();

</script></body></html>
